<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-labelledby="title desc">
  <title id="title">Val Addons Logo</title>
  <desc id="desc">A fantasy adventure emblem featuring a stylized golden V over a shield, mountains, and arcane ring.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f2b"/>
      <stop offset="55%" stop-color="#17374a"/>
      <stop offset="100%" stop-color="#2d1b14"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#7dd6ff" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#7dd6ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7dd6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff0ad"/>
      <stop offset="30%" stop-color="#f2c35c"/>
      <stop offset="68%" stop-color="#b97520"/>
      <stop offset="100%" stop-color="#6e3f13"/>
    </linearGradient>
    <linearGradient id="metalEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe7a2"/>
      <stop offset="100%" stop-color="#8d5218"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="shieldClip">
      <path d="M200 38 C262 38 314 64 336 98 L326 218 C321 286 271 340 200 364 C129 340 79 286 74 218 L64 98 C86 64 138 38 200 38 Z"/>
    </clipPath>
  </defs>

  <rect width="400" height="400" rx="40" fill="url(#bg)"/>
  <circle cx="200" cy="164" r="164" fill="url(#glow)"/>

  <g filter="url(#softShadow)">
    <circle cx="200" cy="184" r="132" fill="none" stroke="#7fd9ff" stroke-opacity="0.34" stroke-width="4"/>
    <circle cx="200" cy="184" r="114" fill="none" stroke="#d7a74d" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="3 12"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M200 38 C262 38 314 64 336 98 L326 218 C321 286 271 340 200 364 C129 340 79 286 74 218 L64 98 C86 64 138 38 200 38 Z" fill="#132735"/>
    <path d="M200 52 C254 52 299 74 317 103 L308 214 C304 272 260 318 200 340 C140 318 96 272 92 214 L83 103 C101 74 146 52 200 52 Z" fill="#0f202c" stroke="url(#metalEdge)" stroke-width="8"/>
  </g>

  <g clip-path="url(#shieldClip)">
    <path d="M58 246 L128 176 L182 232 L225 191 L286 249 L344 191 L344 354 L58 354 Z" fill="#314a3a" opacity="0.92"/>
    <path d="M58 272 L120 210 L162 248 L210 210 L256 258 L330 194 L344 212 L344 354 L58 354 Z" fill="#4d6a46" opacity="0.95"/>
    <path d="M58 150 C118 132 158 132 196 162 C225 184 260 188 344 164 L344 82 L58 82 Z" fill="#6f4f2b" opacity="0.25"/>
    <circle cx="200" cy="120" r="54" fill="#84d9ff" opacity="0.12"/>
    <path d="M142 132 L158 116 L174 132 L158 148 Z" fill="#84d9ff" opacity="0.35"/>
    <path d="M226 108 L238 96 L250 108 L238 120 Z" fill="#84d9ff" opacity="0.3"/>
    <path d="M248 154 L260 142 L272 154 L260 166 Z" fill="#84d9ff" opacity="0.28"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M122 104 L175 104 L200 232 L225 104 L278 104 L221 304 L179 304 Z" fill="url(#metal)" stroke="#fce5a3" stroke-width="6" stroke-linejoin="round"/>
    <path d="M140 118 L166 118 L194 260 L206 260 L234 118 L260 118 L215 290 L185 290 Z" fill="#6e3f13" opacity="0.42"/>
    <path d="M122 104 L175 104 L200 232 L225 104 L278 104" fill="none" stroke="#fff7d5" stroke-opacity="0.75" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M98 308 C126 292 155 284 184 284" fill="none" stroke="#f0bc57" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <path d="M302 308 C274 292 245 284 216 284" fill="none" stroke="#f0bc57" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <circle cx="98" cy="308" r="5" fill="#f0bc57"/>
    <circle cx="302" cy="308" r="5" fill="#f0bc57"/>
  </g>

  <rect x="20" y="20" width="360" height="360" rx="30" fill="none" stroke="#d6a24b" stroke-opacity="0.35" stroke-width="2"/>
</svg>